; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor Configuration
monitor_speed = 115200
monitor_filters = 
	default
	time

; Upload Configuration
upload_speed = 921600
upload_port = COM3  ; Change this to your COM port

; Build Flags
build_flags = 
	-D CORE_DEBUG_LEVEL=3
	-D CONFIG_BT_ENABLED
	-D CONFIG_BLUEDROID_ENABLED

; Library Dependencies
lib_deps = 
	adafruit/DHT sensor library @ ^1.4.4
	adafruit/Adafruit Unified Sensor @ ^1.1.9

; Partition Scheme (needed for Bluetooth)
board_build.partitions = default.csv

[env:esp32dev-ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = 192.168.1.100  ; Change to your ESP32 IP address for OTA updates
upload_flags =
	--auth=your_password  ; Optional OTA password
